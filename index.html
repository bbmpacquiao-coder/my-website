 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endless Jump Game</title>

<style>
body {
  margin: 0;
  background: #0f2027;
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
}

canvas {
  background: #203a43;
  display: block;
  margin: 20px auto;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.donate {
  background: #ff4b2b;
  color: white;
}
</style>
</head>

<body>

<h2>🚀 Endless Jump Game</h2>
<p>Tap or press SPACE to start & jump</p>

<canvas id="game" width="350" height="500"></canvas>

<br>
<button class="donate" onclick="donate()">❤️ Support Me</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, score, gameStarted, gameOver;
let gravity = 0.4;
let jump = -7;
let speed = 2;

let bestScore = localStorage.getItem("bestScore") || 0;
let particles = [];
let shake = 0;

// 🔊 SOUND SYSTEM (FIXED + RELIABLE)
const jumpSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-quick-jump-arcade-game-239.mp3");
const hitSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3");
const scoreSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-retro-game-notification-212.mp3");

jumpSound.preload = "auto";
hitSound.preload = "auto";
scoreSound.preload = "auto";

jumpSound.volume = 0.5;
hitSound.volume = 0.6;
scoreSound.volume = 0.3;

// RESET GAME
function resetGame() {
  player = { x: 50, y: 200, size: 20, velocity: 0 };
  obstacles = [];
  particles = [];
  score = 0;
  gameStarted = false;
  gameOver = false;
  speed = 2;
}

resetGame();

// OBSTACLES
function createObstacle() {
  let gap = 150 - Math.min(score / 10, 70);
  let height = Math.random() * 150 + 80;

  obstacles.push({
    x: canvas.width,
    width: 30,
    top: height,
    bottom: canvas.height - height - gap
  });
}

setInterval(createObstacle, 1800);

// 💥 PARTICLES
function createExplosion(x, y) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 30
    });
  }
}

function updateParticles() {
  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle = "yellow";
    ctx.fillRect(p.x, p.y, 3, 3);

    if (p.life <= 0) {
      particles.splice(i, 1);
      i--;
    }
  }
}

// 🎮 MAIN LOOP
function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // SCREEN SHAKE
  if (shake > 0) {
    ctx.save();
    ctx.translate(Math.random() * 10 - 5, Math.random() * 10 - 5);
    shake--;
  }

  // START SCREEN
  if (!gameStarted && !gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Click to Start", 100, 240);
    ctx.fillText("Best: " + bestScore, 120, 280);
    requestAnimationFrame(update);
    return;
  }

  // GAME OVER
  if (gameOver) {
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem("bestScore", bestScore);
    }

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Game Over!", 110, 200);
    ctx.fillText("Score: " + score, 120, 240);
    ctx.fillText("Best: " + bestScore, 120, 270);
    ctx.fillText("Click to Restart", 80, 320);

    ctx.font = "16px Arial";
    ctx.fillText("Support ❤️ below if you enjoyed!", 60, 360);

    updateParticles();

    if (shake > 0) ctx.restore();
    requestAnimationFrame(update);
    return;
  }

  // PHYSICS
  player.velocity += gravity;
  player.y += player.velocity;
  if (player.velocity > 10) player.velocity = 10;

  // PLAYER (animated)
  let pulse = Math.sin(Date.now() * 0.01) * 2;
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size + pulse, player.size + pulse);

  // OBSTACLES
  for (let i = 0; i < obstacles.length; i++) {
    let obs = obstacles[i];
    obs.x -= speed;

    ctx.fillStyle = "red";
    ctx.fillRect(obs.x, 0, obs.width, obs.top);
    ctx.fillRect(obs.x, canvas.height - obs.bottom, obs.width, obs.bottom);

    // COLLISION
    if (
      player.x < obs.x + obs.width &&
      player.x + player.size > obs.x &&
      (player.y < obs.top || player.y + player.size > canvas.height - obs.bottom)
    ) {
      gameOver = true;
      shake = 10;

      hitSound.currentTime = 0;
      hitSound.play().catch(() => {});

      createExplosion(player.x, player.y);
    }

    if (obs.x < -30) {
      obstacles.splice(i, 1);
      i--;
    }
  }

  // BOUNDS
  if (player.y > canvas.height || player.y < 0) {
    gameOver = true;
    shake = 10;

    hitSound.currentTime = 0;
    hitSound.play().catch(() => {});

    createExplosion(player.x, player.y);
  }

  // SCORE
  score++;

  // 🔊 score sound (dopamine)
  if (score % 50 === 0) {
    scoreSound.currentTime = 0;
    scoreSound.play().catch(() => {});
  }

  // DIFFICULTY
  if (score % 200 === 0) speed += 0.3;

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);
  ctx.fillText("Best: " + bestScore, 220, 30);

  updateParticles();

  if (shake > 0) ctx.restore();

  requestAnimationFrame(update);
}

// CONTROLS
function handleInput() {
  if (!gameStarted) {
    gameStarted = true;
    return;
  }

  if (gameOver) {
    resetGame();
    return;
  }

  player.velocity = jump;

  jumpSound.currentTime = 0;
  jumpSound.play().catch(() => {});
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") handleInput();
});

canvas.addEventListener("click", handleInput);

update();

// 💰 DONATION
function donate() {
  window.location.href = "https://bbmpacquiao-coder.github.io/morris-donation/";
}
</script>

</body>
</html>
