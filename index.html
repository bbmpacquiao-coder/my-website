<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Game</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#5c94fc,#8fd3ff);
}

canvas{
  display:block;
  margin:10px auto;
  background:#dff6ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}
</style>
</head>

<body>

<canvas id="game" width="360" height="520"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// SETTINGS
const GRAVITY = 0.5;
const JUMP = -8;
const SPEED = 2;

// STATE
let player, obstacles, gold, started, over, time;

// RESET
function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  gold = 0;
  started = false;
  over = false;
  time = 0;
}
reset();

// SPAWN
setInterval(()=>{
  if(!started || over) return;

  let gap = 170;
  let top = Math.random()*180 + 60;

  obstacles.push({
    x:360,
    w:45,
    top:top,
    bottom:520-(top+gap),
    passed:false
  });
},1400);

// FORMAT TIME
function formatTime(sec){
  let m = Math.floor(sec/60);
  let s = Math.floor(sec%60);
  return m + ":" + (s<10 ? "0"+s : s);
}

// LOOP
function update(){
  ctx.clearRect(0,0,360,520);

  ctx.font = "18px Arial";
  ctx.fillStyle = "black";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    ctx.fillText("Gold: " + gold,130,300);
    requestAnimationFrame(update);
    return;
  }

  // TIME
  time += 1/60;

  // PLAYER
  player.v += GRAVITY;
  player.y += player.v;

  ctx.fillStyle = "#1e90ff";
  ctx.fillRect(player.x, player.y, 16, 22);

  // OBSTACLES
  obstacles.forEach(o=>{
    o.x -= SPEED;

    ctx.fillStyle = "#8B4513";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,520-o.bottom,o.w,o.bottom);

    // COLLISION
    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top || player.y+22 > 520-o.bottom)){
        over = true;
    }

    // GOLD
    if(!o.passed && o.x+o.w < player.x){
      o.passed = true;
      gold++;
    }
  });

  if(player.y > 520){
    over = true;
  }

  // UI
  ctx.fillText("Gold: " + gold, 10, 25);
  ctx.fillText("Time: " + formatTime(time), 240, 25);

  requestAnimationFrame(update);
}

// TAP
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
}

canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

// START
update();
</script>

</body>
</html>
