<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Tap Game PRO</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#5c94fc,#8fd3ff);
}

/* GAME */
canvas{
  display:block;
  margin:10px auto;
  background:#dff6ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}

/* DONATE BUTTON */
#donateBtn{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 24px;
  border:none;
  border-radius:30px;
  background:#ff4b2b;
  color:white;
  font-weight:bold;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

/* POPUP */
#popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:320px;
  text-align:center;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-size:15px;
}

.paypal{background:#0070ba;color:white;}
.copy{background:#333;color:white;}
.close{background:#ccc;}

/* TEXT */
.info{
  margin:10px 0;
  font-weight:bold;
}
</style>
</head>

<body>

<canvas id="game" width="360" height="520"></canvas>
<button id="donateBtn">💰 Support Me</button>

<!-- POPUP -->
<div id="popup">
  <div class="box">

    <h3>❤️ Support Me</h3>

    <button class="btn paypal" onclick="donateClick()">Pay via PayPal</button>

    <p class="info">Maya</p>

    <div class="info">Name: Morris Zoleta</div>
    <button class="btn copy" onclick="copyName()">Copy Name</button>

    <div class="info">Number: 09289652830</div>
    <button class="btn copy" onclick="copyNumber()">Copy Number</button>

    <button class="btn close" onclick="closePopup()">Close</button>

  </div>
</div>

<script>
// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRAVITY = 700;
const JUMP = -300;
const DRAG = 0.98;
const SPEED = 130;
const MAX_FALL = 400;

let player, obstacles, score, started, over, last;

function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  score = 0;
  started = false;
  over = false;
  last = 0;
}
reset();

// SPAWN
setInterval(()=>{
  if(!started || over) return;

  let gap = 170;
  let top = Math.random()*180 + 60;

  obstacles.push({
    x: canvas.width,
    w: 45,
    top: top,
    bottom: canvas.height - (top + gap)
  });
}, 1400);

// LOOP
function update(t){
  if(!last) last = t;
  let dt = (t - last)/1000;
  last = t;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.font = "18px Arial";
  ctx.fillStyle = "black";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    requestAnimationFrame(update);
    return;
  }

  // physics
  player.v += GRAVITY * dt;
  player.v *= DRAG;

  if(player.v > MAX_FALL) player.v = MAX_FALL;

  player.y += player.v * dt;

  if(player.y < 0) player.y = 0;

  // player
  ctx.fillStyle = "#1e90ff";
  ctx.fillRect(player.x, player.y, 16, 22);

  // obstacles
  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle = "#8B4513";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top-5 || player.y+22 > canvas.height-o.bottom+5)){
        over = true;
    }
  });

  if(player.y > canvas.height){
    over = true;
  }

  score += dt * 60;
  ctx.fillText("Score: " + Math.floor(score), 10, 25);

  requestAnimationFrame(update);
}

// TAP
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
}

canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

// ===== DONATION SYSTEM =====
const popup = document.getElementById("popup");
const donateBtn = document.getElementById("donateBtn");

donateBtn.onclick = ()=> popup.style.display = "flex";

function closePopup(){
  popup.style.display = "none";
}

function donateClick(){
  window.location.href = "https://www.paypal.me/MorrisZoleta982";
}

function copyName(){
  navigator.clipboard.writeText("Morris Zoleta");
  alert("Name copied 👍");
}

function copyNumber(){
  navigator.clipboard.writeText("09289652830");
  alert("Number copied 👍");
}

// CLOSE ON OUTSIDE CLICK
popup.addEventListener("click", e=>{
  if(e.target === popup) closePopup();
});

// START
requestAnimationFrame(update);
</script>

</body>
</html>
