 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Money Game</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#5c94fc, #cce6ff);
  text-align: center;
  font-family: Arial;
}

canvas {
  display: block;
  margin: 20px auto;
  background: #87ceeb;
  border-radius: 10px;
}

#actions {
  margin-top: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.revive { background: gold; }
.restart { background: #333; color: white; }
.donate { background: #ff4b2b; color: white; }
.skin { background: purple; color: white; }
.reward { background: green; color: white; }
</style>
</head>

<body>

<h2>🍄 Ultimate Money Game</h2>
<p>Earn coins. Upgrade. Support ❤️</p>

<canvas id="game" width="350" height="500"></canvas>

<div id="actions"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const actions = document.getElementById("actions");

// STATE (persistent)
let coins = parseInt(localStorage.getItem("coins")) || 0;
let bestScore = parseInt(localStorage.getItem("bestScore")) || 0;
let skin = localStorage.getItem("skin") || "red";
let doubleCoins = localStorage.getItem("doubleCoins") === "true";

// TEMP
let player, obstacles, coinsArr;
let score, gameStarted, gameOver, speed, combo;

// AUDIO
let audioCtx;
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function sound(f,t){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=f;
  g.gain.value=0.2;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+t);
  o.stop(audioCtx.currentTime+t);
}

// RESET
function resetGame(){
  player={x:50,y:200,size:20,velocity:0};
  obstacles=[];
  coinsArr=[];
  score=0;
  combo=0;
  speed=2;
  gameStarted=false;
  gameOver=false;
  actions.innerHTML="";
}
resetGame();

// DAILY REWARD
function dailyReward(){
  let last = localStorage.getItem("lastReward");
  let now = Date.now();

  if(!last || now - last > 86400000){
    coins += 20;
    localStorage.setItem("coins", coins);
    localStorage.setItem("lastReward", now);
    alert("🎁 You got 20 FREE coins!");
  } else {
    alert("Come back tomorrow for reward!");
  }
}

// SPAWN
function createObstacle(){
  let gap=150-Math.min(score/10,70);
  let h=Math.random()*150+80;
  obstacles.push({x:350,w:40,top:h,bottom:500-h-gap});
}
function createCoin(){
  coinsArr.push({x:350,y:Math.random()*400+50,size:10});
}
setInterval(createObstacle,1800);
setInterval(createCoin,1200);

// LOOP
function update(){
  ctx.clearRect(0,0,350,500);

  if(!gameStarted){
    ctx.fillText("Click to Start",110,240);
    ctx.fillText("Coins:"+coins,130,270);
    ctx.fillText("Best:"+bestScore,130,300);

    showMenu();
    requestAnimationFrame(update);
    return;
  }

  if(gameOver){
    drawGameOver();
    requestAnimationFrame(update);
    return;
  }

  // physics
  player.velocity+=0.4;
  player.y+=player.velocity;

  // PLAYER (skin)
  ctx.fillStyle = skin === "gold" ? "gold" : "red";
  ctx.fillRect(player.x,player.y,20,20);

  // obstacles
  for(let i=0;i<obstacles.length;i++){
    let o=obstacles[i];
    o.x-=speed;

    ctx.fillStyle="brown";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,500-o.bottom,o.w,o.bottom);

    if(player.x<o.x+o.w && player.x+20>o.x &&
      (player.y<o.top || player.y+20>500-o.bottom)){
        endGame();
    }

    if(o.x<-40){ obstacles.splice(i,1); i--; }
  }

  // coins
  for(let i=0;i<coinsArr.length;i++){
    let c=coinsArr[i];
    c.x-=speed;

    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(c.x,c.y,8,0,Math.PI*2);
    ctx.fill();

    if(player.x<c.x+10 && player.x+20>c.x &&
       player.y<c.y+10 && player.y+20>c.y){
        let gain = doubleCoins ? 2 : 1;
        coins += gain;
        combo++;
        sound(800,0.1);
        coinsArr.splice(i,1);
        i--;
    }

    if(c.x<0){ coinsArr.splice(i,1); i--; }
  }

  if(player.y>500 || player.y<0){
    endGame();
  }

  score++;

  // 💀 difficulty spike
  if(score%120===0) speed+=0.6;

  ctx.fillStyle="black";
  ctx.fillText("Score:"+score,10,20);
  ctx.fillText("Coins:"+coins,250,20);
  ctx.fillText("Combo:"+combo,130,20);

  requestAnimationFrame(update);
}

// MENU (monetization)
function showMenu(){
  if(actions.innerHTML===""){
    actions.innerHTML = `
      <button class="reward" onclick="dailyReward()">🎁 Daily Reward</button>
      <button class="skin" onclick="buySkin()">🎨 Unlock Gold Skin (50 coins)</button>
      <button class="donate" onclick="donate()">💰 Donate (Unlock x2 coins)</button>
    `;
  }
}

// GAME OVER
function drawGameOver(){
  ctx.fillText("Game Over",120,200);
  ctx.fillText("Score:"+score,120,230);
  ctx.fillText("Coins:"+coins,120,260);

  if(score>bestScore){
    bestScore=score;
    localStorage.setItem("bestScore",bestScore);
  }

  if(actions.innerHTML===""){
    actions.innerHTML = `
      <button class="revive" onclick="revive(15)">❤️ Revive (15 coins)</button>
      <button class="donate" onclick="donate()">💰 Not enough? Support</button>
      <button class="restart" onclick="restart()">🔁 Restart</button>
    `;
  }
}

// END
function endGame(){
  gameOver=true;
  sound(150,0.4);
  localStorage.setItem("coins", coins);
}

// CONTROLS
function handle(){
  initAudio();

  if(!gameStarted){
    gameStarted=true;
    return;
  }

  if(gameOver) return;

  player.velocity=-7;
  sound(500,0.2);
}

canvas.addEventListener("click",handle);
document.addEventListener("keydown",e=>{
  if(e.code==="Space") handle();
});

// 💸 CORE SYSTEM
function revive(cost){
  if(coins>=cost){
    coins-=cost;
    gameOver=false;
    player.y=200;
    player.velocity=0;
    actions.innerHTML="";
  } else {
    donate();
  }
}

function restart(){
  resetGame();
}

function buySkin(){
  if(coins>=50){
    coins-=50;
    skin="gold";
    localStorage.setItem("skin",skin);
    localStorage.setItem("coins",coins);
    alert("🎨 Gold Skin Unlocked!");
  } else {
    donate();
  }
}

function donate(){
  localStorage.setItem("doubleCoins", true);
  alert("🚀 x2 Coins Activated!");
  window.location.href="https://bbmpacquiao-coder.github.io/morris-donation/";
}

update();
</script>

</body>
</html>
