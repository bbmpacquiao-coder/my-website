<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Style Endless Game</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#5c94fc, #cce6ff);
  text-align: center;
  font-family: Arial, sans-serif;
  color: #222;
}

canvas {
  background: #87ceeb;
  display: block;
  margin: 20px auto;
  border-radius: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.donate {
  background: #ff4b2b;
  color: white;
}
</style>
</head>

<body>

<h2>🍄 Mario Endless Jump</h2>
<p>Click or press SPACE to jump</p>

<canvas id="game" width="350" height="500"></canvas>

<br>
<button class="donate" onclick="donate()">❤️ Support Me</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// GAME STATE
let player, obstacles, score, gameStarted, gameOver;
let gravity = 0.4;
let jump = -7;
let speed = 2;

let bestScore = localStorage.getItem("bestScore") || 0;
let particles = [];
let shake = 0;

// 🔊 AUDIO (WebAudio - always works)
let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playJump() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "square";
  o.frequency.setValueAtTime(500, audioCtx.currentTime);
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.2);
}

function playHit() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "sawtooth";
  o.frequency.setValueAtTime(150, audioCtx.currentTime);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.4);
}

function playScore() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(800, audioCtx.currentTime);
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.15);
}

// RESET
function resetGame() {
  player = { x: 50, y: 200, size: 20, velocity: 0 };
  obstacles = [];
  particles = [];
  score = 0;
  gameStarted = false;
  gameOver = false;
  speed = 2;
}

resetGame();

// OBSTACLES
function createObstacle() {
  let gap = 150 - Math.min(score / 10, 70);
  let height = Math.random() * 150 + 80;

  obstacles.push({
    x: canvas.width,
    width: 40,
    top: height,
    bottom: canvas.height - height - gap
  });
}

setInterval(createObstacle, 1800);

// PARTICLES
function createExplosion(x, y) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 30
    });
  }
}

function updateParticles() {
  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle = "yellow";
    ctx.fillRect(p.x, p.y, 3, 3);

    if (p.life <= 0) {
      particles.splice(i, 1);
      i--;
    }
  }
}

// DRAW BRICKS
function drawBricks(x, y, width, height) {
  for (let i = 0; i < height; i += 20) {
    for (let j = 0; j < width; j += 20) {
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(x + j, y + i, 18, 18);
      ctx.strokeStyle = "#5a2e0c";
      ctx.strokeRect(x + j, y + i, 18, 18);
    }
  }
}

// GAME LOOP
function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (shake > 0) {
    ctx.save();
    ctx.translate(Math.random()*10-5, Math.random()*10-5);
    shake--;
  }

  if (!gameStarted && !gameOver) {
    ctx.fillStyle = "#000";
    ctx.font = "20px Arial";
    ctx.fillText("Click to Start", 100, 250);
    ctx.fillText("Best: " + bestScore, 120, 290);
    requestAnimationFrame(update);
    return;
  }

  if (gameOver) {
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem("bestScore", bestScore);
    }

    ctx.fillStyle = "#000";
    ctx.fillText("Game Over!", 110, 220);
    ctx.fillText("Score: " + score, 120, 260);
    ctx.fillText("Best: " + bestScore, 120, 290);
    ctx.fillText("Click to Restart", 80, 330);

    updateParticles();

    if (shake > 0) ctx.restore();
    requestAnimationFrame(update);
    return;
  }

  // physics
  player.velocity += gravity;
  player.y += player.velocity;

  // 🍄 Mario-style player
  let size = player.size;
  ctx.fillStyle = "red";
  ctx.fillRect(player.x, player.y, size, size);
  ctx.fillStyle = "darkred";
  ctx.fillRect(player.x, player.y, size, size/3);
  ctx.fillStyle = "#ffd6a5";
  ctx.fillRect(player.x, player.y+size/3, size, size/2);

  // obstacles
  for (let i = 0; i < obstacles.length; i++) {
    let obs = obstacles[i];
    obs.x -= speed;

    drawBricks(obs.x, 0, obs.width, obs.top);
    drawBricks(obs.x, canvas.height - obs.bottom, obs.width, obs.bottom);

    if (
      player.x < obs.x + obs.width &&
      player.x + size > obs.x &&
      (player.y < obs.top || player.y + size > canvas.height - obs.bottom)
    ) {
      gameOver = true;
      shake = 10;
      playHit();
      createExplosion(player.x, player.y);
    }

    if (obs.x < -40) {
      obstacles.splice(i,1);
      i--;
    }
  }

  if (player.y > canvas.height || player.y < 0) {
    gameOver = true;
    shake = 10;
    playHit();
    createExplosion(player.x, player.y);
  }

  score++;
  if (score % 50 === 0) playScore();
  if (score % 200 === 0) speed += 0.3;

  ctx.fillStyle = "#000";
  ctx.fillText("Score: " + score, 10, 30);
  ctx.fillText("Best: " + bestScore, 220, 30);

  updateParticles();

  if (shake > 0) ctx.restore();

  requestAnimationFrame(update);
}

// CONTROLS
function handleInput() {
  initAudio();

  if (!gameStarted) {
    gameStarted = true;
    return;
  }

  if (gameOver) {
    resetGame();
    return;
  }

  player.velocity = jump;
  playJump();
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") handleInput();
});

canvas.addEventListener("click", handleInput);

update();

// DONATE
function donate() {
  window.location.href = "https://bbmpacquiao-coder.github.io/morris-donation/";
}
</script>

</body>
</html>
