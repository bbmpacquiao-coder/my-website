<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
  x: 50,
  y: 200,
  size: 20,
  velocity: 0
};

let gravity = 0.5;
let jump = -8;

let obstacles = [];
let score = 0;
let gameStarted = false;

function createObstacle() {
  let height = Math.random() * 200 + 50;
  obstacles.push({
    x: canvas.width,
    width: 30,
    top: height,
    bottom: canvas.height - height - 120
  });
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // START SCREEN
  if (!gameStarted) {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Click or Press SPACE to Start", 40, 250);
    requestAnimationFrame(update);
    return;
  }

  // physics
  player.velocity += gravity;
  player.y += player.velocity;

  // draw player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // obstacles
  obstacles.forEach((obs, i) => {
    obs.x -= 3;

    ctx.fillStyle = "red";
    ctx.fillRect(obs.x, 0, obs.width, obs.top);
    ctx.fillRect(obs.x, canvas.height - obs.bottom, obs.width, obs.bottom);

    // collision
    if (
      player.x < obs.x + obs.width &&
      player.x + player.size > obs.x &&
      (player.y < obs.top || player.y + player.size > canvas.height - obs.bottom)
    ) {
      endGame();
    }

    if (obs.x < -30) obstacles.splice(i, 1);
  });

  // ground/ceiling
  if (player.y > canvas.height || player.y < 0) {
    endGame();
  }

  // score
  score++;
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  requestAnimationFrame(update);
}

function endGame() {
  alert("Game Over! Score: " + score);
  document.location.reload();
}

// controls
function startGame() {
  if (!gameStarted) {
    gameStarted = true;
    setInterval(createObstacle, 1500);
  }
  player.velocity = jump;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") startGame();
});

canvas.addEventListener("click", startGame);

// start loop
update();

// donation
function donate() {
  window.location.href = "https://bbmpacquiao-coder.github.io/morris-donation/";
}
</script>
