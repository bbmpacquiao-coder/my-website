 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Tap Game VIRAL</title>

<style>
html, body {
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#5c94fc,#8fd3ff);
}

/* GAME */
canvas {
  display:block;
  margin:10px auto;
  background:#dff6ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* DONATE */
#donateBtn {
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  padding:16px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  font-weight:bold;
  box-shadow:0 10px 30px rgba(255,75,43,0.6);
}

/* POPUP */
#popup {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.box {
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
  color:white;
}

/* BUTTONS */
.btn {
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
}

.paypal {background:#0070ba;}
.copy {background:#333;}
.maya {background:#00c853;}
.close {background:#ccc;color:black;}

/* CARDS */
.card {
  background:rgba(255,255,255,0.2);
  padding:10px;
  border-radius:10px;
  margin:8px 0;
}

/* DONATION FEED */
#feed {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  padding:8px 16px;
  border-radius:20px;
  font-size:14px;
  opacity:0;
  transition:0.5s;
}

/* REWARD */
#reward {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}
</style>
</head>

<body>

<div id="feed"></div>

<canvas id="game" width="360" height="520"></canvas>
<button id="donateBtn">💰 Support Me</button>

<div id="popup">
  <div class="box">
    <h2>❤️ Support Me</h2>

    <button class="btn paypal" onclick="donateClick()">Pay via PayPal</button>

    <h3>Maya</h3>

    <div class="card">Name: Morris Zoleta</div>
    <button class="btn copy" onclick="copyName()">Copy Name</button>

    <div class="card">Number: 09289652830</div>
    <button class="btn copy" onclick="copyNumber()">Copy Number</button>

    <button class="btn close" onclick="closePopup()">Close</button>
  </div>
</div>

<div id="reward">
  <h3>🎉 Thank You!</h3>
  <p>You unlocked bonus luck 🍀</p>
</div>

<script>
// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player={x:70,y:200,v:0},obs=[],score=0,started=false,over=false;

function reset(){player.y=200;player.v=0;obs=[];score=0;started=false;over=false;}

setInterval(()=>{
 if(!started||over)return;
 let gap=150,top=Math.random()*200+50;
 obs.push({x:360,w:40,top:top,bottom:520-(top+gap)});
},1400);

function loop(){
 ctx.clearRect(0,0,360,520);

 if(!started){ctx.fillText("Tap to Start",120,260);return requestAnimationFrame(loop);}
 if(over){ctx.fillText("Game Over",120,260);return requestAnimationFrame(loop);}

 player.v+=800*0.016;
 player.y+=player.v*0.016;

 ctx.fillRect(player.x,player.y,16,22);

 obs.forEach(o=>{
   o.x-=2;
   ctx.fillRect(o.x,0,o.w,o.top);
   ctx.fillRect(o.x,520-o.bottom,o.w,o.bottom);
 });

 score++;
 ctx.fillText("Score "+score,10,20);

 requestAnimationFrame(loop);
}
loop();

canvas.onclick=()=>{
 if(!started)started=true;
 else if(over)reset();
 else player.v=-10;
};

// ===== POPUP =====
const popup=document.getElementById("popup");
document.getElementById("donateBtn").onclick=()=>popup.style.display="flex";
function closePopup(){popup.style.display="none";}

// ===== COPY =====
function copyName(){navigator.clipboard.writeText("Morris Zoleta");alert("Copied");}
function copyNumber(){navigator.clipboard.writeText("09289652830");alert("Copied");}

// ===== PAYPAL =====
function donateClick(){
 showReward();
 window.location.href="https://www.paypal.me/MorrisZoleta982";
}

// ===== REWARD =====
function showReward(){
 let r=document.getElementById("reward");
 r.style.transform="translate(-50%,-50%) scale(1)";
 setTimeout(()=>r.style.transform="translate(-50%,-50%) scale(0)",2000);
}

// ===== FAKE FEED =====
const names=["Juan","Maria","Alex","Chris","Luna"];
function showFeed(){
 let f=document.getElementById("feed");
 let n=names[Math.floor(Math.random()*names.length)];
 let amount=[10,20,50,100][Math.floor(Math.random()*4)];
 f.innerText=n+" donated ₱"+amount+" 🎉";
 f.style.opacity=1;
 setTimeout(()=>f.style.opacity=0,3000);
}
setInterval(showFeed,5000);
</script>

</body>
</html>
