 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Money Game</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#5c94fc, #cce6ff);
  text-align: center;
  font-family: Arial;
}

canvas {
  display: block;
  margin: 20px auto;
  background: #87ceeb;
  border-radius: 10px;
}

#actions {
  margin-top: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.revive { background: gold; }
.restart { background: #333; color: white; }
.donate { background: #ff4b2b; color: white; }
</style>
</head>

<body>

<h2>🍄 Pro Money Game</h2>
<p>Collect coins. Use them… or support ❤️</p>

<canvas id="game" width="350" height="500"></canvas>

<div id="actions"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const actions = document.getElementById("actions");

// STATE
let player, obstacles, coinsArr;
let score, coins, gameStarted, gameOver, speed;
let bestScore = localStorage.getItem("bestScore") || 0;

// 🔊 AUDIO
let audioCtx;
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function sound(freq,time){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=freq;
  g.gain.value=0.2;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+time);
  o.stop(audioCtx.currentTime+time);
}

// RESET
function resetGame(){
  player={x:50,y:200,size:20,velocity:0};
  obstacles=[];
  coinsArr=[];
  score=0;
  coins=coins || 0; // keep coins (progression trick 💀)
  speed=2;
  gameStarted=false;
  gameOver=false;
  actions.innerHTML="";
}
resetGame();

// SPAWN
function createObstacle(){
  let gap=150-Math.min(score/10,70);
  let h=Math.random()*150+80;
  obstacles.push({x:350,w:40,top:h,bottom:500-h-gap});
}
function createCoin(){
  coinsArr.push({
    x:350,
    y:Math.random()*400+50,
    size:10
  });
}
setInterval(createObstacle,1800);
setInterval(createCoin,1400);

// LOOP
function update(){
  ctx.clearRect(0,0,350,500);

  if(!gameStarted){
    ctx.fillText("Click to Start",110,250);
    ctx.fillText("Coins:"+coins,130,280);
    requestAnimationFrame(update);
    return;
  }

  if(gameOver){
    drawGameOver();
    requestAnimationFrame(update);
    return;
  }

  // physics
  player.velocity+=0.4;
  player.y+=player.velocity;

  // player
  ctx.fillStyle="red";
  ctx.fillRect(player.x,player.y,20,20);

  // obstacles
  for(let i=0;i<obstacles.length;i++){
    let o=obstacles[i];
    o.x-=speed;

    ctx.fillStyle="brown";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,500-o.bottom,o.w,o.bottom);

    if(player.x<o.x+o.w && player.x+20>o.x &&
      (player.y<o.top || player.y+20>500-o.bottom)){
        endGame();
    }

    if(o.x<-40){ obstacles.splice(i,1); i--; }
  }

  // coins
  for(let i=0;i<coinsArr.length;i++){
    let c=coinsArr[i];
    c.x-=speed;

    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(c.x,c.y,8,0,Math.PI*2);
    ctx.fill();

    if(player.x<c.x+10 && player.x+20>c.x &&
       player.y<c.y+10 && player.y+20>c.y){
        coins++;
        coinsArr.splice(i,1);
        sound(800,0.1);
        i--;
    }

    if(c.x<0){ coinsArr.splice(i,1); i--; }
  }

  if(player.y>500 || player.y<0){
    endGame();
  }

  score++;

  // 💀 difficulty spike (forces failure)
  if(score%150===0) speed+=0.5;

  ctx.fillStyle="black";
  ctx.fillText("Score:"+score,10,20);
  ctx.fillText("Coins:"+coins,250,20);

  requestAnimationFrame(update);
}

// GAME OVER UI (PSYCHOLOGY 💸)
function drawGameOver(){
  ctx.fillText("Game Over",120,200);
  ctx.fillText("Score:"+score,120,230);
  ctx.fillText("Coins:"+coins,120,260);

  if(actions.innerHTML===""){

    let reviveCost = 10;

    actions.innerHTML = `
      <button class="revive" onclick="revive(${reviveCost})">
        ❤️ Revive (${reviveCost} coins)
      </button>

      <button class="donate" onclick="donate()">
        💰 Not enough? Support to revive
      </button>

      <button class="restart" onclick="restart()">
        🔁 Restart
      </button>
    `;
  }
}

// END
function endGame(){
  gameOver=true;
  sound(150,0.4);
}

// CONTROLS
function handle(){
  initAudio();

  if(!gameStarted){
    gameStarted=true;
    return;
  }

  if(gameOver) return;

  player.velocity=-7;
  sound(500,0.2);
}

canvas.addEventListener("click",handle);
document.addEventListener("keydown",e=>{
  if(e.code==="Space") handle();
});

// 💸 MONETIZATION CORE
function revive(cost){
  if(coins >= cost){
    coins -= cost;

    gameOver=false;
    player.y=200;
    player.velocity=0;

    actions.innerHTML="";
  } else {
    donate(); // 💰 force donation path
  }
}

function restart(){
  resetGame();
}

function donate(){
  window.location.href="https://bbmpacquiao-coder.github.io/morris-donation/";
}

update();
</script>

</body>
</html>
