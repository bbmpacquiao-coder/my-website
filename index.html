 <script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, score, gameStarted, gameOver;
let gravity = 0.4;   // easier
let jump = -7;

function resetGame() {
  player = { x: 50, y: 200, size: 20, velocity: 0 };
  obstacles = [];
  score = 0;
  gameStarted = false;
  gameOver = false;
}

resetGame();

function createObstacle() {
  let height = Math.random() * 150 + 80; // easier gaps
  obstacles.push({
    x: canvas.width,
    width: 30,
    top: height,
    bottom: canvas.height - height - 150
  });
}

setInterval(createObstacle, 1800); // slower = easier

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // START SCREEN
  if (!gameStarted && !gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Click to Start", 100, 250);
    requestAnimationFrame(update);
    return;
  }

  // GAME OVER SCREEN
  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Game Over! Score: " + score, 70, 230);
    ctx.fillText("Click to Restart", 90, 270);
    requestAnimationFrame(update);
    return;
  }

  // physics
  player.velocity += gravity;
  player.y += player.velocity;

  // player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // obstacles
  for (let i = 0; i < obstacles.length; i++) {
    let obs = obstacles[i];
    obs.x -= 2; // slower speed

    ctx.fillStyle = "red";
    ctx.fillRect(obs.x, 0, obs.width, obs.top);
    ctx.fillRect(obs.x, canvas.height - obs.bottom, obs.width, obs.bottom);

    // collision
    if (
      player.x < obs.x + obs.width &&
      player.x + player.size > obs.x &&
      (player.y < obs.top || player.y + player.size > canvas.height - obs.bottom)
    ) {
      gameOver = true;
    }

    if (obs.x < -30) {
      obstacles.splice(i, 1);
      i--;
    }
  }

  // bounds
  if (player.y > canvas.height || player.y < 0) {
    gameOver = true;
  }

  // score
  score++;
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  requestAnimationFrame(update);
}

// controls
function handleInput() {
  if (!gameStarted) {
    gameStarted = true;
    return;
  }

  if (gameOver) {
    resetGame();
    return;
  }

  player.velocity = jump;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") handleInput();
});

canvas.addEventListener("click", handleInput);

update();

// donation
function donate() {
  window.location.href = "https://bbmpacquiao-coder.github.io/morris-donation/";
}
</script>
