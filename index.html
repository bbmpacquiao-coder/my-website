<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Money Game</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#5c94fc, #cce6ff);
  text-align: center;
  font-family: Arial;
}

canvas {
  display: block;
  margin: 20px auto;
  background: #87ceeb;
  border-radius: 10px;
}

#actions { margin-top: 10px; }

button, input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.leaderboard {
  background: rgba(0,0,0,0.2);
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

.donate { background: #ff4b2b; color: white; }
.skin { background: gold; }
</style>
</head>

<body>

<h2>🍄 Ultimate Money Game</h2>
<div id="userInfo"></div>
<div class="leaderboard" id="leaderboard"></div>

<canvas id="game" width="350" height="500"></canvas>
<div id="actions"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const actions = document.getElementById("actions");
const userInfo = document.getElementById("userInfo");
const leaderboardDiv = document.getElementById("leaderboard");

// AUDIO
let audioCtx;
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state==="suspended") audioCtx.resume();
}
function playSound(f,t){
  if(!audioCtx) return;
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.frequency.value=f;
  g.gain.value=0.2;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+t);
  o.stop(audioCtx.currentTime+t);
}

// ACCOUNT
let currentUser = localStorage.getItem("currentUser");

function getUserData(){
  return JSON.parse(localStorage.getItem("user_"+currentUser)) || {
    coins:0,bestScore:0,lastReward:0,skin:"normal"
  };
}
function saveUserData(data){
  localStorage.setItem("user_"+currentUser, JSON.stringify(data));
}

// LEADERBOARD
function getLeaderboard(){
  return JSON.parse(localStorage.getItem("leaderboard")) || [];
}
function saveScore(name,score){
  let b=getLeaderboard();
  b.push({name,score});
  b.sort((a,b)=>b.score-a.score);
  b=b.slice(0,5);
  localStorage.setItem("leaderboard",JSON.stringify(b));
  renderLeaderboard();
}
function renderLeaderboard(){
  let b=getLeaderboard();
  let html="<h3>🏆 Leaderboard</h3>";
  b.forEach((p,i)=> html+=`<div>${i+1}. ${p.name} - ${p.score}</div>`);
  leaderboardDiv.innerHTML=html;
}

// LOGIN
function showLogin(){
  actions.innerHTML = `
    <input id="email" placeholder="Enter email">
    <button onclick="login()">Login</button>
  `;
}
function login(){
  let email=document.getElementById("email").value;
  if(!email) return alert("Enter email!");
  currentUser=email;
  localStorage.setItem("currentUser",email);
  actions.innerHTML="";
}
function updateUserInfo(){
  userInfo.innerHTML = currentUser ? "👤 "+currentUser : "";
}

// GAME
let player, obstacles, coinsArr;
let score=0, gameStarted=false, gameOver=false;

function resetGame(){
  player={x:50,y:200,velocity:0};
  obstacles=[];
  coinsArr=[];
  score=0;
  gameStarted=false;
  gameOver=false;
  actions.innerHTML="";
}
resetGame();

// OBSTACLES (BRICK STYLE)
function createObstacle(){
  const gap = 130;
  const top = Math.random()*200+50;

  obstacles.push({
    x:350,
    w:40,
    top:top,
    bottom:500-top-gap
  });
}

function drawBrick(x,y,w,h){
  ctx.fillStyle="#b5522b";
  ctx.fillRect(x,y,w,h);

  ctx.strokeStyle="#7a2f14";
  for(let i=0;i<w;i+=10){
    for(let j=0;j<h;j+=10){
      ctx.strokeRect(x+i,y+j,10,10);
    }
  }
}

// COINS
function createCoin(){
  coinsArr.push({
    x:350,y:Math.random()*400+50
  });
}

setInterval(createObstacle,1600);
setInterval(createCoin,1200);

// DRAW PLAYER (HUMAN STYLE)
function drawPlayer(data){
  let x = player.x;
  let y = player.y;

  let bodyColor = data.skin==="gold" ? "gold" : "blue";

  // body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(x, y, 15, 20);

  // head
  ctx.beginPath();
  ctx.arc(x+7.5, y-5, 6, 0, Math.PI*2);
  ctx.fillStyle = "#ffcc99";
  ctx.fill();

  // eyes
  ctx.fillStyle = "black";
  ctx.fillRect(x+5,y-6,2,2);
  ctx.fillRect(x+9,y-6,2,2);
}

// LOOP
function update(){
  ctx.clearRect(0,0,350,500);

  if(!currentUser){
    ctx.fillText("Login First",120,250);
    showLogin();
    requestAnimationFrame(update);
    return;
  }

  let data=getUserData();

  if(!gameStarted){
    ctx.fillText("Click to Start",110,230);
    ctx.fillText("Coins: "+data.coins,120,260);
    ctx.fillText("Best: "+data.bestScore,120,290);

    showMenu();
    requestAnimationFrame(update);
    return;
  }

  if(gameOver){
    ctx.fillText("Game Over",120,220);
    ctx.fillText("Score: "+score,120,250);

    saveScore(currentUser,score);

    if(actions.innerHTML===""){
      actions.innerHTML=`
        <button onclick="revive()">❤️ Revive (10)</button>
        <button class="donate" onclick="donate()">💰 Donate</button>
        <button onclick="resetGame()">🔁 Restart</button>
      `;
    }

    requestAnimationFrame(update);
    return;
  }

  // physics
  player.velocity+=0.4;
  player.y+=player.velocity;

  drawPlayer(data);

  // obstacles
  obstacles.forEach(o=>{
    o.x-=2;

    drawBrick(o.x,0,o.w,o.top);
    drawBrick(o.x,500-o.bottom,o.w,o.bottom);

    if(player.x<o.x+o.w && player.x+15>o.x &&
      (player.y<o.top || player.y+20>500-o.bottom)){
        gameOver=true;
        playSound(150,0.4);
    }
  });

  // coins
  coinsArr.forEach((c,i)=>{
    c.x-=2;

    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(c.x,c.y,8,0,Math.PI*2);
    ctx.fill();

    if(player.x<c.x+10 && player.x+15>c.x &&
       player.y<c.y+10 && player.y+20>c.y){
        data.coins++;
        coinsArr.splice(i,1);
        playSound(800,0.1);
    }
  });

  if(player.y>500 || player.y<0){
    gameOver=true;
  }

  score++;
  ctx.fillStyle="black";
  ctx.fillText("Score:"+score,10,20);

  if(score>data.bestScore){
    data.bestScore=score;
  }

  saveUserData(data);
  requestAnimationFrame(update);
}

// MENU
function showMenu(){
  if(actions.innerHTML===""){
    actions.innerHTML=`
      <button onclick="dailyReward()">🎁 Daily (20)</button>
      <button class="skin" onclick="buySkin()">✨ Gold Skin (100)</button>
      <button class="donate" onclick="donate()">💰 Support</button>
    `;
  }
}

// FEATURES
function dailyReward(){
  let d=getUserData();
  let now=Date.now();
  if(now-d.lastReward>86400000){
    d.coins+=20;
    d.lastReward=now;
    saveUserData(d);
    alert("20 coins!");
  }
}

function buySkin(){
  let d=getUserData();
  if(d.coins>=100){
    d.coins-=100;
    d.skin="gold";
    saveUserData(d);
    alert("✨ Gold Skin Unlocked!");
  } else donate();
}

function revive(){
  let d=getUserData();
  if(d.coins>=10){
    d.coins-=10;
    gameOver=false;
    player.y=200;
    player.velocity=0;
    actions.innerHTML="";
    saveUserData(d);
  } else donate();
}

// DONATE
function donate(){
  window.open("https://bbmpacquiao-coder.github.io/morris-donation/", "_blank");
}

// CONTROLS
function handle(){
  initAudio();

  if(!gameStarted){
    gameStarted=true;
    return;
  }

  if(gameOver) return;

  player.velocity=-7;
  playSound(500,0.2);
}

canvas.addEventListener("click",handle);
document.addEventListener("keydown",e=>{
  if(e.code==="Space") handle();
});

// INIT
updateUserInfo();
renderLeaderboard();
update();
</script>

</body>
</html>
