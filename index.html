 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultimate Tap Game</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#5c94fc, #cce6ff);
  font-family: Arial;
  text-align: center;
}

/* GAME */
canvas {
  display: block;
  margin: 10px auto;
  background: #87ceeb;
  border-radius: 12px;
  width: 92vw;
  max-width: 360px;
  touch-action: none;
}

/* DONATE BUTTON */
#donateBtn {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 22px;
  font-size: 16px;
  border-radius: 14px;
  border: none;
  background: #ff4b2b;
  color: white;
  z-index: 9999;
  box-shadow: 0 5px 12px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<canvas id="game" width="360" height="520"></canvas>
<button id="donateBtn">💰 Support Me</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const donateBtn = document.getElementById("donateBtn");

// ===== BALANCED PHYSICS (MEDIUM FAST) =====
const GRAVITY = 800;
const JUMP = -250;
const DRAG = 0.95;
const SPEED = 130;

let player, obstacles, score, started, over;

// RESET
function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  score = 0;
  started = false;
  over = false;
}
reset();

// SPAWN OBSTACLES (faster)
setInterval(()=>{
  if(!started || over) return;

  let gap = 160;
  let top = Math.random()*180 + 60;

  obstacles.push({
    x: canvas.width,
    w: 45,
    top: top,
    bottom: canvas.height - (top + gap)
  });
}, 1400);

// LOOP
let last = 0;

function update(t){
  let dt = (t - last)/1000;
  last = t;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // START SCREEN
  if(!started){
    ctx.font = "20px Arial";
    ctx.fillText("TAP TO START",110,260);
    requestAnimationFrame(update);
    return;
  }

  // GAME OVER
  if(over){
    ctx.font = "20px Arial";
    ctx.fillText("GAME OVER",120,240);
    ctx.fillText("Tap to Restart",100,270);
    requestAnimationFrame(update);
    return;
  }

  // PHYSICS
  player.v += GRAVITY * dt;
  player.v *= DRAG;
  player.y += player.v * dt;

  if(player.y < 0) player.y = 0;

  // PLAYER
  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, 16, 22);

  // OBSTACLES
  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle = "#8B4513";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    // COLLISION
    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top-5 || player.y+22 > canvas.height-o.bottom+5)){
        over = true;
    }
  });

  // GROUND
  if(player.y > canvas.height){
    over = true;
  }

  score += dt * 60;
  ctx.fillStyle = "black";
  ctx.fillText("Score: " + Math.floor(score), 10, 25);

  requestAnimationFrame(update);
}

// TAP CONTROL (ANDROID PERFECT)
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
}

// TOUCH EVENTS
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
}, {passive:false});

canvas.addEventListener("click", tap);

// DONATION LINK (ANDROID SAFE)
function openDonate(){
  window.location.href = "https://bbmpacquiao-coder.github.io/morris-donation/";
}

donateBtn.addEventListener("touchstart", e=>{
  e.preventDefault();
  openDonate();
});

donateBtn.addEventListener("click", openDonate);

// START
requestAnimationFrame(update);
</script>

</body>
</html>
