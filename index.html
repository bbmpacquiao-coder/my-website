<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Game GOLD FIX</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#5c94fc,#8fd3ff);
}

canvas{
  display:block;
  margin:10px auto;
  background:#dff6ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}

#donateBtn{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 24px;
  border:none;
  border-radius:30px;
  background:#ff4b2b;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<canvas id="game" width="360" height="520"></canvas>
<button id="donateBtn" onclick="donate()">💰 Support Me</button>

<script>
// ===== SIMPLE AUDIO (SAFE) =====
let audioCtx;

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function beep(freq, time){
  if(!audioCtx) return;

  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.frequency.value = freq;
  g.gain.value = 0.2;

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + time);
}

// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, coins, started, over;
let time = 0;

function reset(){
  player = {x:70, y:220, v:0};
  obstacles = [];
  coins = 0;
  started = false;
  over = false;
  time = 0;
}
reset();

// spawn
setInterval(()=>{
  if(!started || over) return;

  let gap = 170;
  let top = Math.random()*180 + 60;

  obstacles.push({
    x:360,
    w:45,
    top:top,
    bottom:520-(top+gap),
    passed:false
  });
},1400);

// loop
function update(){
  ctx.clearRect(0,0,360,520);

  ctx.font="18px Arial";
  ctx.fillStyle="black";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    ctx.fillText("Gold: "+coins,120,300);
    requestAnimationFrame(update);
    return;
  }

  // time
  time += 1/60;

  // physics
  player.v += 0.5;
  player.y += player.v;

  ctx.fillStyle="#1e90ff";
  ctx.fillRect(player.x,player.y,16,22);

  obstacles.forEach(o=>{
    o.x -= 2;

    ctx.fillStyle="#8B4513";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,520-o.bottom,o.w,o.bottom);

    // collision
    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top || player.y+22 > 520-o.bottom)){
        if(!over){
          over = true;
          beep(120,0.4);
        }
    }

    // coins
    if(!o.passed && o.x+o.w < player.x){
      o.passed = true;
      coins++;
    }
  });

  if(player.y > 520){
    over = true;
    beep(120,0.4);
  }

  // UI
  let sec = Math.floor(time);
  let m = Math.floor(sec/60);
  let s = sec%60;

  ctx.fillText("Gold: "+coins,10,25);
  ctx.fillText("Time: "+m+":"+(s<10?"0"+s:s),220,25);

  requestAnimationFrame(update);
}

// tap
function tap(){
  initAudio();

  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = -8;
  beep(400,0.1);
}

canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

// donate
function donate(){
  window.location.href = "https://www.paypal.me/MorrisZoleta982";
}

update();
</script>

</body>
</html>
