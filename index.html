<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultimate Tap Game</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#5c94fc, #cce6ff);
  font-family: Arial;
  text-align: center;
}

/* GAME */
canvas {
  display: block;
  margin: 10px auto;
  background: #87ceeb;
  border-radius: 12px;
  width: 92vw;
  max-width: 360px;
  touch-action: none;
}

/* DONATE BUTTON */
#donateBtn {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 22px;
  font-size: 16px;
  border-radius: 14px;
  border: none;
  background: #ff4b2b;
  color: white;
  z-index: 9999;
  box-shadow: 0 5px 12px rgba(0,0,0,0.3);
}

/* POPUP */
#donatePopup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

.popupBox {
  background:white;
  padding:20px;
  border-radius:18px;
  width:85%;
  max-width:320px;
  text-align:center;
}

.popupBox h2 {
  margin-top:0;
}

.payBtn {
  display:block;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
  width:100%;
  color:white;
}

/* PayPal */
.paypal {
  background:#0070ba;
}

/* Maya */
.maya {
  background:#00c853;
}

/* Close */
.closeBtn {
  margin-top:10px;
  background:#ccc;
  color:black;
}
</style>
</head>

<body>

<canvas id="game" width="360" height="520"></canvas>

<button id="donateBtn">💰 Support Me</button>

<!-- POPUP -->
<div id="donatePopup">
  <div class="popupBox">
    <h2>Support Me ❤️</h2>

    <button class="payBtn paypal" onclick="openPayPal()">
      Pay via PayPal
    </button>

    <button class="payBtn maya" onclick="openMaya()">
      Send via Maya
    </button>

    <button class="payBtn closeBtn" onclick="closePopup()">
      Close
    </button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== GAME =====
const GRAVITY = 800;
const JUMP = -250;
const DRAG = 0.95;
const SPEED = 130;

let player, obstacles, score, started, over;

function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  score = 0;
  started = false;
  over = false;
}
reset();

setInterval(()=>{
  if(!started || over) return;

  let gap = 160;
  let top = Math.random()*180 + 60;

  obstacles.push({
    x: canvas.width,
    w: 45,
    top: top,
    bottom: canvas.height - (top + gap)
  });
}, 1400);

let last = 0;

function update(t){
  let dt = (t - last)/1000;
  last = t;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!started){
    ctx.font = "20px Arial";
    ctx.fillText("TAP TO START",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.font = "20px Arial";
    ctx.fillText("GAME OVER",120,240);
    ctx.fillText("Tap to Restart",100,270);
    requestAnimationFrame(update);
    return;
  }

  player.v += GRAVITY * dt;
  player.v *= DRAG;
  player.y += player.v * dt;

  if(player.y < 0) player.y = 0;

  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, 16, 22);

  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle = "#8B4513";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top-5 || player.y+22 > canvas.height-o.bottom+5)){
        over = true;
    }
  });

  if(player.y > canvas.height){
    over = true;
  }

  score += dt * 60;
  ctx.fillStyle = "black";
  ctx.fillText("Score: " + Math.floor(score), 10, 25);

  requestAnimationFrame(update);
}

// TAP
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
}

canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
}, {passive:false});

canvas.addEventListener("click", tap);

// ===== DONATION SYSTEM =====
const popup = document.getElementById("donatePopup");
const donateBtn = document.getElementById("donateBtn");

donateBtn.onclick = () => popup.style.display = "flex";

function closePopup(){
  popup.style.display = "none";
}

// 🔥 PAYPAL (opens app if installed)
function openPayPal(){
  window.location.href = "https://www.paypal.me/YOURUSERNAME";
}

// 🔥 MAYA (uses your number)
function openMaya(){
  window.location.href = "tel:+639289652830";
}

// START
requestAnimationFrame(update);
</script>

</body>
</html>
