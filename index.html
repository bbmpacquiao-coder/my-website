 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Money Game</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#5c94fc, #cce6ff);
  text-align: center;
  font-family: Arial;
}

canvas {
  display: block;
  margin: 10px auto;
  background: #87ceeb;
  border-radius: 10px;
  touch-action: manipulation;
}

button, input {
  padding: 12px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.loginBox {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin: 30px auto;
  width: 80%;
  max-width: 300px;
}

.hidden { display: none; }

.leaderboard {
  background: rgba(0,0,0,0.2);
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

.donate { background: #ff4b2b; color: white; }
.skin { background: gold; }
</style>
</head>

<body>

<h2>🍄 Ultimate Money Game</h2>

<!-- LOGIN SCREEN (SEPARATE) -->
<div id="loginScreen" class="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Enter email">
  <br>
  <button onclick="login()">Start Game</button>
</div>

<!-- GAME UI -->
<div id="gameUI" class="hidden">
  <div id="userInfo"></div>
  <div class="leaderboard" id="leaderboard"></div>
  <canvas id="game" width="350" height="500"></canvas>
  <div id="actions"></div>
</div>

<script>
let currentUser = localStorage.getItem("currentUser");

// LOGIN FIRST (NO GAME LOOP YET)
function login(){
  let email = document.getElementById("email").value;
  if(!email) return alert("Enter email!");

  currentUser = email;
  localStorage.setItem("currentUser", email);

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("gameUI").classList.remove("hidden");

  initGame(); // START GAME ONLY AFTER LOGIN
}

// AUTO LOGIN (if already saved)
if(currentUser){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("gameUI").classList.remove("hidden");
  initGame();
}

// ================= GAME =================

function initGame(){

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const actions = document.getElementById("actions");
const userInfo = document.getElementById("userInfo");
const leaderboardDiv = document.getElementById("leaderboard");

// DATA
function getUserData(){
  return JSON.parse(localStorage.getItem("user_"+currentUser)) || {
    coins:0,bestScore:0,lastReward:0,skin:"normal"
  };
}
function saveUserData(data){
  localStorage.setItem("user_"+currentUser, JSON.stringify(data));
}

// LEADERBOARD
function getLeaderboard(){
  return JSON.parse(localStorage.getItem("leaderboard")) || [];
}
function saveScore(name,score){
  let b=getLeaderboard();
  b.push({name,score});
  b.sort((a,b)=>b.score-a.score);
  b=b.slice(0,5);
  localStorage.setItem("leaderboard",JSON.stringify(b));
  renderLeaderboard();
}
function renderLeaderboard(){
  let b=getLeaderboard();
  let html="<h3>🏆 Leaderboard</h3>";
  b.forEach((p,i)=> html+=`<div>${i+1}. ${p.name} - ${p.score}</div>`);
  leaderboardDiv.innerHTML=html;
}

// UI
userInfo.innerHTML = "👤 " + currentUser;
renderLeaderboard();

// GAME VARS
let player={x:50,y:200,velocity:0};
let obstacles=[], coinsArr=[];
let score=0, gameStarted=false, gameOver=false;

// SPAWN
setInterval(()=>{
  obstacles.push({
    x:350,
    w:40,
    top:Math.random()*200+50,
    bottom:150
  });
},1600);

setInterval(()=>{
  coinsArr.push({
    x:350,
    y:Math.random()*400+50
  });
},1200);

// LOOP
function update(){
  ctx.clearRect(0,0,350,500);

  let data=getUserData();

  if(!gameStarted){
    ctx.fillText("Tap to Start",110,230);
    requestAnimationFrame(update);
    return;
  }

  if(gameOver){
    ctx.fillText("Game Over",120,220);
    ctx.fillText("Score: "+score,120,250);

    saveScore(currentUser,score);

    if(actions.innerHTML===""){
      actions.innerHTML=`
        <button onclick="location.reload()">🔁 Restart</button>
        <button class="donate" onclick="donate()">💰 Donate</button>
      `;
    }

    requestAnimationFrame(update);
    return;
  }

  player.velocity+=0.4;
  player.y+=player.velocity;

  // PLAYER
  ctx.fillStyle = data.skin==="gold" ? "gold" : "blue";
  ctx.fillRect(player.x, player.y, 15, 20);

  // OBSTACLES
  obstacles.forEach(o=>{
    o.x-=2;

    ctx.fillStyle="#b5522b";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,350,o.w,150);

    if(player.x<o.x+o.w && player.x+15>o.x &&
      (player.y<o.top || player.y+20>350)){
        gameOver=true;
    }
  });

  // COINS
  coinsArr.forEach((c,i)=>{
    c.x-=2;

    ctx.beginPath();
    ctx.arc(c.x,c.y,8,0,Math.PI*2);
    ctx.fillStyle="gold";
    ctx.fill();

    if(player.x<c.x+10 && player.x+15>c.x &&
       player.y<c.y+10 && player.y+20>c.y){
        data.coins++;
        coinsArr.splice(i,1);
    }
  });

  if(player.y>500 || player.y<0){
    gameOver=true;
  }

  score++;
  ctx.fillText("Score:"+score,10,20);

  saveUserData(data);
  requestAnimationFrame(update);
}

// CONTROLS
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  handle();
});
canvas.addEventListener("click", handle);

function handle(){
  if(!gameStarted){
    gameStarted=true;
    return;
  }
  if(gameOver) return;
  player.velocity=-7;
}

function donate(){
  window.open("https://bbmpacquiao-coder.github.io/morris-donation/");
}

// START LOOP
update();

} // END initGame
</script>

</body>
</html>
