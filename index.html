<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Game PRO FINAL</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#5c94fc,#8fd3ff);
}

canvas{
  display:block;
  margin:10px auto;
  background:#dff6ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}

#donateBtn{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 24px;
  border:none;
  border-radius:30px;
  background:#ff4b2b;
  color:white;
  font-weight:bold;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<canvas id="game" width="360" height="520"></canvas>
<button id="donateBtn" onclick="donate()">💰 Support Me</button>

<script>
// ================= AUDIO ENGINE (SUPER RELIABLE) =================
let audioCtx;
let unlocked = false;

function initAudio(){
  if(unlocked) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // resume context (important for mobile)
  audioCtx.resume();

  unlocked = true;
}

// SOUND GENERATORS (no external files = no blocking)
function playJump(){
  if(!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playHit(){
  if(!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(120, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

// ================= GAME =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRAVITY = 700;
const JUMP = -300;
const SPEED = 130;

let player, obstacles, score, started, over, last;

function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  score = 0;
  started = false;
  over = false;
  last = 0;
}
reset();

// spawn obstacles
setInterval(()=>{
  if(!started || over) return;

  let gap = 170;
  let top = Math.random()*180 + 60;

  obstacles.push({
    x: canvas.width,
    w: 45,
    top: top,
    bottom: canvas.height - (top + gap)
  });
},1400);

// loop
function update(t){
  if(!last) last = t;
  let dt = (t - last)/1000;
  last = t;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.font = "18px Arial";
  ctx.fillStyle = "black";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    requestAnimationFrame(update);
    return;
  }

  // physics
  player.v += GRAVITY * dt;
  player.y += player.v * dt;

  ctx.fillStyle="#1e90ff";
  ctx.fillRect(player.x,player.y,16,22);

  // obstacles
  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle="#8B4513";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top || player.y+22 > canvas.height-o.bottom)){
        triggerGameOver();
    }
  });

  if(player.y > canvas.height){
    triggerGameOver();
  }

  score += dt*60;
  ctx.fillText("Score: "+Math.floor(score),10,25);

  requestAnimationFrame(update);
}

// game over
function triggerGameOver(){
  if(!over){
    over = true;
    playHit();
  }
}

// tap
function tap(){
  initAudio();

  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
  playJump();
}

canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

// donation
function donate(){
  window.location.href = "https://www.paypal.me/MorrisZoleta982";
}

// start loop
requestAnimationFrame(update);
</script>

</body>
</html>
