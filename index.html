 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Easy Tap Game</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#5c94fc, #cce6ff);
  font-family: Arial;
  text-align: center;
}

canvas {
  display: block;
  margin: 10px auto;
  background: #87ceeb;
  border-radius: 10px;
  width: 90vw;
  max-width: 350px;
  touch-action: none;
}

/* DONATE BUTTON */
#donateBtn {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 20px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: #ff4b2b;
  color: white;
  z-index: 10;
}
</style>
</head>

<body>

<canvas id="game" width="350" height="500"></canvas>

<button id="donateBtn">💰 Support Me</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const donateBtn = document.getElementById("donateBtn");

// ===== EASY PHYSICS =====
const GRAVITY = 400;
const JUMP = -150;
const DRAG = 0.90;
const SPEED = 90;

let player, obstacles, score, started, over;

// RESET
function reset(){
  player = { x:60, y:200, v:0 };
  obstacles = [];
  score = 0;
  started = false;
  over = false;
}
reset();

// SPAWN
setInterval(()=>{
  if(!started || over) return;

  let gap = 170;
  let top = Math.random()*180 + 60;

  obstacles.push({
    x: canvas.width,
    w: 40,
    top: top,
    bottom: canvas.height - (top + gap)
  });
}, 1800);

// LOOP
let last = 0;

function update(t){
  let dt = (t - last)/1000;
  last = t;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!started){
    ctx.fillText("TAP TO START",110,250);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("GAME OVER",120,230);
    ctx.fillText("Tap to Restart",100,260);
    requestAnimationFrame(update);
    return;
  }

  // PHYSICS
  player.v += GRAVITY * dt;
  player.v *= DRAG;
  player.y += player.v * dt;

  if(player.y < 0) player.y = 0;

  // PLAYER
  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, 15, 20);

  // OBSTACLES
  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle = "brown";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    if(player.x < o.x+o.w && player.x+15 > o.x &&
      (player.y < o.top-5 || player.y+20 > canvas.height-o.bottom+5)){
        over = true;
    }
  });

  if(player.y > canvas.height){
    over = true;
  }

  score += dt * 60;
  ctx.fillText("Score: " + Math.floor(score), 10, 20);

  requestAnimationFrame(update);
}

// TAP CONTROL
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
}

// ANDROID TOUCH
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
}, {passive:false});

canvas.addEventListener("click", tap);

// DONATE BUTTON FIX (ANDROID SAFE)
function openDonate(){
  window.location.href = "https://bbmpacquiao-coder.github.io/morris-donation/";
}

donateBtn.addEventListener("touchstart", function(e){
  e.preventDefault();
  openDonate();
});

donateBtn.addEventListener("click", openDonate);

// START
requestAnimationFrame(update);
</script>

</body>
</html>
