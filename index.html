  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endless Jump Game</title>

<style>
body {
  margin: 0;
  background: #0f2027;
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
}

canvas {
  background: #203a43;
  display: block;
  margin: 20px auto;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.donate {
  background: #ff4b2b;
  color: white;
}
</style>
</head>

<body>

<h2>🚀 Endless Jump Game</h2>
<p>Tap or press SPACE to start & jump</p>

<canvas id="game" width="350" height="500"></canvas>

<br>
<button class="donate" onclick="donate()">❤️ Support Me</button>
 
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, score, gameStarted, gameOver;
let gravity = 0.4;
let jump = -7;

let speed = 2;
let bestScore = localStorage.getItem("bestScore") || 0;

function resetGame() {
  player = { x: 50, y: 200, size: 20, velocity: 0 };
  obstacles = [];
  score = 0;
  gameStarted = false;
  gameOver = false;
  speed = 2;
}

resetGame();

function createObstacle() {
  let gap = 150 - Math.min(score / 10, 60); // gap gets smaller = harder
  let height = Math.random() * 150 + 80;

  obstacles.push({
    x: canvas.width,
    width: 30,
    top: height,
    bottom: canvas.height - height - gap
  });
}

setInterval(createObstacle, 1800);

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // START SCREEN
  if (!gameStarted && !gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Click to Start", 100, 240);
    ctx.fillText("Beat High Score: " + bestScore, 70, 280);
    requestAnimationFrame(update);
    return;
  }

  // GAME OVER
  if (gameOver) {
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem("bestScore", bestScore);
    }

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Game Over!", 110, 200);
    ctx.fillText("Score: " + score, 120, 240);
    ctx.fillText("Best: " + bestScore, 120, 270);
    ctx.fillText("Click to Restart", 80, 320);

    // 💰 soft donation message
    ctx.font = "16px Arial";
    ctx.fillText("Enjoyed? Support ❤️ below", 80, 360);

    requestAnimationFrame(update);
    return;
  }

  // physics
  player.velocity += gravity;
  player.y += player.velocity;

  // smooth cap
  if (player.velocity > 10) player.velocity = 10;

  // player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // obstacles
  for (let i = 0; i < obstacles.length; i++) {
    let obs = obstacles[i];
    obs.x -= speed;

    ctx.fillStyle = "red";
    ctx.fillRect(obs.x, 0, obs.width, obs.top);
    ctx.fillRect(obs.x, canvas.height - obs.bottom, obs.width, obs.bottom);

    // collision
    if (
      player.x < obs.x + obs.width &&
      player.x + player.size > obs.x &&
      (player.y < obs.top || player.y + player.size > canvas.height - obs.bottom)
    ) {
      gameOver = true;
    }

    if (obs.x < -30) {
      obstacles.splice(i, 1);
      i--;
    }
  }

  // bounds
  if (player.y > canvas.height || player.y < 0) {
    gameOver = true;
  }

  // increase difficulty
  score++;
  if (score % 200 === 0) speed += 0.3;

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);
  ctx.fillText("Best: " + bestScore, 220, 30);

  requestAnimationFrame(update);
}

// controls
function handleInput() {
  if (!gameStarted) {
    gameStarted = true;
    return;
  }

  if (gameOver) {
    resetGame();
    return;
  }

  player.velocity = jump;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") handleInput();
});

canvas.addEventListener("click", handleInput);

update();

// donation
function donate() {
  window.location.href = "https://bbmpacquiao-coder.github.io/morris-donation/";
}
</script> 
 
 
 
 

</body>
</html>
