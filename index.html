<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Game GOLD EDITION</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#5c94fc,#8fd3ff);
}

canvas{
  display:block;
  margin:10px auto;
  background:#dff6ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}

#donateBtn{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 24px;
  border:none;
  border-radius:30px;
  background:#ff4b2b;
  color:white;
  font-weight:bold;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<canvas id="game" width="360" height="520"></canvas>
<button id="donateBtn" onclick="donate()">💰 Support Me</button>

<script>
// ===== AUDIO (WORKING) =====
let audioCtx;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume();
}

function playJump(){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = 400;
  g.gain.value = 0.2;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.15);
}

function playHit(){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = 120;
  g.gain.value = 0.3;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.4);
}

// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRAVITY = 700;
const JUMP = -300;
const SPEED = 130;

let player, obstacles, coins, started, over, last;
let startTime, elapsed;

function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  coins = 0;
  started = false;
  over = false;
  last = 0;
  startTime = 0;
  elapsed = 0;
}
reset();

// spawn
setInterval(()=>{
  if(!started || over) return;

  let gap = 170;
  let top = Math.random()*180 + 60;

  obstacles.push({
    x: canvas.width,
    w: 45,
    top: top,
    bottom: canvas.height - (top + gap),
    passed:false
  });
},1400);

// format time
function formatTime(sec){
  let m = Math.floor(sec/60);
  let s = Math.floor(sec%60);
  return m + ":" + (s<10?"0"+s:s);
}

// loop
function update(t){
  if(!last) last = t;
  let dt = (t - last)/1000;
  last = t;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font = "18px Arial";
  ctx.fillStyle = "black";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    ctx.fillText("Gold Earned: " + coins,100,300);
    requestAnimationFrame(update);
    return;
  }

  // time
  elapsed = (performance.now() - startTime)/1000;

  // physics
  player.v += GRAVITY * dt;
  player.y += player.v * dt;

  ctx.fillStyle="#1e90ff";
  ctx.fillRect(player.x,player.y,16,22);

  // obstacles
  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle="#8B4513";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    // collision
    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top || player.y+22 > canvas.height-o.bottom)){
        if(!over){
          over = true;
          playHit();
        }
    }

    // earn coin when passed
    if(!o.passed && o.x + o.w < player.x){
      o.passed = true;
      coins += 1;
    }
  });

  if(player.y > canvas.height){
    if(!over){
      over = true;
      playHit();
    }
  }

  // UI
  ctx.fillText("Gold: " + coins, 10, 25);
  ctx.fillText("Time: " + formatTime(elapsed), 240, 25);

  requestAnimationFrame(update);
}

// tap
function tap(){
  initAudio();

  if(!started){
    started = true;
    startTime = performance.now();
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
  playJump();
}

canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

// donate
function donate(){
  window.location.href = "https://www.paypal.me/MorrisZoleta982";
}

requestAnimationFrame(update);
</script>

</body>
</html>
