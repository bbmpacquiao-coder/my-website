 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 🔥 CRITICAL FIX: disables zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Ultimate Money Game</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden; /* prevents jump */
  font-family: Arial;
  background: linear-gradient(#5c94fc, #cce6ff);
}

/* CENTER EVERYTHING */
.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* LOGIN */
.loginBox {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 80%;
  max-width: 300px;
  text-align: center;
}

/* INPUT FIX (IMPORTANT) */
input {
  font-size: 16px; /* prevents iOS zoom */
  padding: 12px;
  width: 90%;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.hidden { display: none; }

/* GAME */
canvas {
  background: #87ceeb;
  border-radius: 10px;
  margin-top: 10px;
  touch-action: manipulation;
}

.donate { background: #ff4b2b; color: white; }
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen" class="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Enter email">
  <button onclick="login()">Start Game</button>
</div>

<!-- GAME -->
<div id="gameUI" class="hidden">
  <div id="userInfo"></div>
  <canvas id="game" width="350" height="500"></canvas>
  <div id="actions"></div>
</div>

</div>

<script>
let currentUser = localStorage.getItem("currentUser");

// LOGIN
function login(){
  let email = document.getElementById("email").value;
  if(!email) return alert("Enter email!");

  currentUser = email;
  localStorage.setItem("currentUser", email);

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("gameUI").classList.remove("hidden");

  startGame();
}

// AUTO LOGIN
if(currentUser){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("gameUI").classList.remove("hidden");
  startGame();
}

// GAME
function startGame(){

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player={x:50,y:200,velocity:0};
let obstacles=[];
let score=0, gameStarted=false, gameOver=false;

// SPAWN
setInterval(()=>{
  obstacles.push({
    x:350,
    w:40,
    top:Math.random()*200+50
  });
},1600);

// LOOP
function update(){
  ctx.clearRect(0,0,350,500);

  if(!gameStarted){
    ctx.fillText("Tap to Start",120,250);
    requestAnimationFrame(update);
    return;
  }

  if(gameOver){
    ctx.fillText("Game Over",120,250);
    requestAnimationFrame(update);
    return;
  }

  player.velocity+=0.4;
  player.y+=player.velocity;

  ctx.fillStyle="blue";
  ctx.fillRect(player.x,player.y,15,20);

  obstacles.forEach(o=>{
    o.x-=2;

    ctx.fillStyle="brown";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,o.top+130,o.w,500);

    if(player.x<o.x+o.w && player.x+15>o.x &&
      (player.y<o.top || player.y+20>o.top+130)){
        gameOver=true;
    }
  });

  if(player.y>500 || player.y<0){
    gameOver=true;
  }

  score++;
  ctx.fillText("Score:"+score,10,20);

  requestAnimationFrame(update);
}

// CONTROLS
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  jump();
});

canvas.addEventListener("click", jump);

function jump(){
  if(!gameStarted){
    gameStarted=true;
    return;
  }
  if(gameOver) return;
  player.velocity=-7;
}

// START
update();

}
</script>

</body>
</html>
