<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Tap Game VIRAL FIXED</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#5c94fc,#8fd3ff);
}

/* GAME */
canvas{
  display:block;
  margin:10px auto;
  background:#dff6ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}

/* DONATE */
#donateBtn{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 24px;
  border:none;
  border-radius:30px;
  background:#ff4b2b;
  color:white;
}

/* POPUP */
#popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:320px;
  text-align:center;
}

/* FEED */
#feed{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  opacity:0;
  transition:0.3s;
}
</style>
</head>

<body>

<div id="feed"></div>

<canvas id="game" width="360" height="520"></canvas>
<button id="donateBtn">💰 Support Me</button>

<div id="popup">
  <div class="box">
    <h3>Support ❤️</h3>
    <button onclick="donateClick()">PayPal</button>
    <p>Maya:</p>
    <button onclick="copyName()">Copy Name</button>
    <button onclick="copyNumber()">Copy Number</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>
<script>
// ===== GAME FIXED PERFECT =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🔥 PERFECT BALANCE
const GRAVITY = 700;
const JUMP = -300;
const DRAG = 0.98;
const SPEED = 130;
const MAX_FALL = 400;

let player, obstacles, score, started, over, last;

function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  score = 0;
  started = false;
  over = false;
  last = 0;
}
reset();

// SPAWN
setInterval(()=>{
  if(!started || over) return;

  let gap = 170; // easier gap
  let top = Math.random()*180 + 60;

  obstacles.push({
    x: canvas.width,
    w: 45,
    top: top,
    bottom: canvas.height - (top + gap)
  });
}, 1400);

// LOOP
function update(t){
  if(!last) last = t;
  let dt = (t - last)/1000;
  last = t;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.font = "18px Arial";
  ctx.fillStyle = "black";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    requestAnimationFrame(update);
    return;
  }

  // ===== PHYSICS =====
  player.v += GRAVITY * dt;
  player.v *= DRAG;

  // limit falling speed (prevents fast drop bug)
  if(player.v > MAX_FALL) player.v = MAX_FALL;

  player.y += player.v * dt;

  if(player.y < 0) player.y = 0;

  // PLAYER
  ctx.fillStyle = "#1e90ff";
  ctx.fillRect(player.x, player.y, 16, 22);

  // OBSTACLES
  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle = "#8B4513";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    // softer collision (less unfair)
    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top-5 || player.y+22 > canvas.height-o.bottom+5)){
        over = true;
    }
  });

  // ground
  if(player.y > canvas.height){
    over = true;
  }

  // SCORE
  score += dt * 60;
  ctx.fillText("Score: " + Math.floor(score), 10, 25);

  requestAnimationFrame(update);
}

// TAP CONTROL
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP; // 🔥 strong jump
}

// EVENTS
canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

// START
requestAnimationFrame(update);
</script>
 
  

</body>
</html>
