 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultra Smooth Game</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#5c94fc, #cce6ff);
  font-family: Arial;
}

canvas {
  display: block;
  margin: auto;
  background: #87ceeb;
  border-radius: 10px;
  width: 90vw;
  max-width: 350px;
  touch-action: none;
}
</style>
</head>

<body>

<canvas id="game" width="350" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== ULTRA SMOOTH PHYSICS =====
let GRAVITY = 900;        // pixels/sec²
let JUMP_FORCE = -300;    // jump impulse
let DRAG = 0.98;          // air resistance
let SPEED = 120;          // obstacle speed

let player, obstacles, score, gameStarted, gameOver;

// RESET
function reset(){
  player = {
    x: 60,
    y: 200,
    velocity: 0
  };
  obstacles = [];
  score = 0;
  gameStarted = false;
  gameOver = false;
}
reset();

// SPAWN
setInterval(()=>{
  if(!gameStarted || gameOver) return;

  let gap = 140;
  let top = Math.random()*200 + 50;

  obstacles.push({
    x: canvas.width,
    w: 40,
    top: top,
    bottom: canvas.height - (top + gap)
  });
}, 1600);

// TIME BASED LOOP
let lastTime = 0;

function update(time){
  let dt = (time - lastTime) / 1000; // seconds
  lastTime = time;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!gameStarted){
    ctx.fillText("TAP TO START",110,250);
    requestAnimationFrame(update);
    return;
  }

  if(gameOver){
    ctx.fillText("GAME OVER",120,230);
    ctx.fillText("Tap to Restart",100,260);
    requestAnimationFrame(update);
    return;
  }

  // ===== PHYSICS =====
  player.velocity += GRAVITY * dt;
  player.velocity *= DRAG; // smooth resistance
  player.y += player.velocity * dt;

  // PLAYER
  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, 15, 20);

  // OBSTACLES
  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle = "brown";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    // collision
    if(player.x < o.x+o.w && player.x+15 > o.x &&
      (player.y < o.top || player.y+20 > canvas.height-o.bottom)){
        gameOver = true;
    }
  });

  // bounds
  if(player.y > canvas.height || player.y < 0){
    gameOver = true;
  }

  score += dt * 60;
  ctx.fillText("Score: " + Math.floor(score), 10, 20);

  requestAnimationFrame(update);
}

// TAP CONTROL (ULTRA SMOOTH)
function tap(){
  if(!gameStarted){
    gameStarted = true;
    return;
  }

  if(gameOver){
    reset();
    return;
  }

  // smooth impulse (not instant jerk)
  player.velocity += JUMP_FORCE;
}

// EVENTS
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
}, {passive:false});

canvas.addEventListener("click", tap);

// START
requestAnimationFrame(update);
</script>

</body>
</html>
