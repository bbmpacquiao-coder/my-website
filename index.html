 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Easy Tap Game</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#5c94fc, #cce6ff);
  font-family: Arial;
}

canvas {
  display: block;
  margin: auto;
  background: #87ceeb;
  border-radius: 10px;
  width: 90vw;
  max-width: 350px;
  touch-action: none;
}
</style>
</head>

<body>

<canvas id="game" width="350" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== ULTRA EASY PHYSICS =====
const GRAVITY = 400;      // slow fall
const JUMP = -150;        // very soft tap
const DRAG = 0.90;        // floaty
const SPEED = 90;         // slow obstacles

let player, obstacles, score, started, over;

// RESET
function reset(){
  player = { x:60, y:200, v:0 };
  obstacles = [];
  score = 0;
  started = false;
  over = false;
}
reset();

// SPAWN OBSTACLES (EASIER GAP)
setInterval(()=>{
  if(!started || over) return;

  let gap = 170; // bigger gap = easier
  let top = Math.random()*180 + 60;

  obstacles.push({
    x: canvas.width,
    w: 40,
    top: top,
    bottom: canvas.height - (top + gap)
  });
}, 1800);

// TIME LOOP
let last = 0;

function update(t){
  let dt = (t - last)/1000;
  last = t;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!started){
    ctx.fillText("TAP TO START",110,250);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("GAME OVER",120,230);
    ctx.fillText("Tap to Restart",100,260);
    requestAnimationFrame(update);
    return;
  }

  // ===== SMOOTH PHYSICS =====
  player.v += GRAVITY * dt;
  player.v *= DRAG;
  player.y += player.v * dt;

  // LIMIT TOP (no instant death)
  if(player.y < 0) player.y = 0;

  // PLAYER
  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, 15, 20);

  // OBSTACLES
  obstacles.forEach(o=>{
    o.x -= SPEED * dt;

    ctx.fillStyle = "brown";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,canvas.height-o.bottom,o.w,o.bottom);

    // collision (more forgiving)
    if(player.x < o.x+o.w && player.x+15 > o.x &&
      (player.y < o.top-5 || player.y+20 > canvas.height-o.bottom+5)){
        over = true;
    }
  });

  // GROUND ONLY death
  if(player.y > canvas.height){
    over = true;
  }

  score += dt * 60;
  ctx.fillText("Score: " + Math.floor(score), 10, 20);

  requestAnimationFrame(update);
}

// TAP CONTROL (SUPER STABLE)
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  // 🔥 KEY FIX: no stacking velocity
  player.v = JUMP;
}

// ANDROID EVENTS
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
}, {passive:false});

canvas.addEventListener("click", tap);

// START
requestAnimationFrame(update);
</script>

</body>
</html>
